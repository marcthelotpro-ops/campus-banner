<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; }
  .top { background:#E2001A; height:4px; }
  .banner { background:#3C3C3C; padding:20px 32px; display:flex; align-items:center; justify-content:space-between; }
  .label { color:#E2001A; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; }
  .title { color:#fff; font-size:22px; font-weight:400; margin-bottom:4px; }
  .sub { color:#AAAAAA; font-size:13px; }
  .btn { background:#E2001A; color:#fff; padding:10px 22px; border-radius:4px; font-size:13px; font-weight:500; text-decoration:none; }
  .bottom { background:#E2001A; height:3px; }
</style>
</head>
<body>
  <div class="top"></div>
  <div class="banner">
    <div>
      <div class="label">Onet Logistique &amp; Production</div>
      <div class="title">Campus de la Performance</div>
      <div class="sub">Base de connaissances &middot; 120 sites</div>
    </div>
    <a class="btn" href="https://mjmconsulting322.sharepoint.com/sites/CP-Projets">+ Créer une fiche</a>
  </div>
  <div class="bottom"></div>
</body>
</html>
